<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>초록잎 생태학교</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        /* 직접 수정할 수 있는 커스텀 디자인 영역 */
        body {
            font-family: 'Pretendard', 'Malgun Gothic', sans-serif;
            color: #333;
        }
        /* 상단 네비게이션 바 색상 (숲을 연상시키는 진녹색) */
        .navbar {
            background-color: #2e5939; 
        }
        .navbar-brand, .nav-link {
            color: #ffffff !important;
        }
        /* 메인 소개 영역 */
        .hero-section {
            background-color: #f4f9f4;
            padding: 80px 0;
            text-align: center;
        }
        .section-title {
            color: #2e5939;
            font-weight: bold;
            margin-bottom: 30px;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">초록잎 생태학교</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="#about">학교 소개</a></li>
                    <li class="nav-item"><a class="nav-link" href="#programs">프로그램(계절숲)</a></li>
                    <li class="nav-item"><a class="nav-link" href="#contact">오시는 길 및 문의</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <header class="hero-section">
        <div class="container">
            <h1 class="display-5 fw-bold">자연 속에서 배우고 성장합니다</h1>
            <p class="lead mt-3">도심 속 아이들을 위한 사계절 숲 체험 프로그램</p>
        </div>
    </header>

    <section id="programs" class="container my-5">
        <h2 class="section-title text-center">진행 중인 프로그램</h2>
        <div class="row g-4 mt-2">
            <div class="col-md-4">
                <div class="card h-100 shadow-sm border-0">
                    <div class="card-body text-center">
                        <h5 class="card-title fw-bold">봄숲 교실</h5>
                        <p class="card-text">새싹이 돋아나는 봄, 동식물의 변화를 관찰하고 자연의 소중함을 배웁니다.</p>
                        <button class="btn btn-outline-success">자세히 보기</button>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card h-100 shadow-sm border-0">
                    <div class="card-body text-center">
                        <h5 class="card-title fw-bold">여름 밤숲 체험</h5>
                        <p class="card-text">반딧불이와 여름 곤충들을 만나며 신비로운 밤의 숲을 탐험합니다.</p>
                        <button class="btn btn-outline-success">자세히 보기</button>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card h-100 shadow-sm border-0">
                    <div class="card-body text-center">
                        <h5 class="card-title fw-bold">프라이빗 가족숲</h5>
                        <p class="card-text">가족 단위로 우리만의 시간을 가질 수 있는 맞춤형 숲 체험입니다.</p>
                        <button class="btn btn-outline-success">자세히 보기</button>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <footer class="text-center py-4 mt-5" style="background-color: #e9ecef;">
        <p class="mb-0 text-muted">© 2026 초록잎 생태학교. All rights reserved.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
